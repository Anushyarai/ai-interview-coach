<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>Upload Resume</h1>

            <p style="text-align:center; color:#cbd5e1;">
                Upload your resume for AI analysis and personalized interview questions.
            </p>

            <br>

            <form method="POST" enctype="multipart/form-data">

                <input
                    type="file"
                    name="resume"
                    required
                >

                <br><br>

                <button type="submit">
                    Analyze Resume
                </button>

            </form>

        </div>

    </div>

</body>
</html>
