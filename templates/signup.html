<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>Create Account</h1>

            <form method="POST">

                <input
                    type="text"
                    name="name"
                    placeholder="Enter Name"
                    required
                >

                <input
                    type="email"
                    name="email"
                    placeholder="Enter Email"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Create Password"
                    required
                >

                <br><br>

                <button type="submit">
                    Signup
                </button>

            </form>

            <p>
                Already have an account?
                <a href="/login">Login</a>
            </p>

        </div>

    </div>

</body>
</html>
